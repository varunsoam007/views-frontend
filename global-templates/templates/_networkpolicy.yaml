{{/*
Render network security resources for an application running in Istio ambient mode.

Generates:
  - Istio AuthorizationPolicy  (L4 ingress - deny-by-default + explicit allow rules)
  - Istio AuthorizationPolicy  (L7 ingress - optional path/method policy)
  - Kubernetes NetworkPolicy   (L4 egress - port restriction)
  - Istio ServiceEntry         (L7 egress - one per external service; map-keyed for deep merge)
  - Istio DestinationRule      (TLS origination - per ServiceEntry, optional)

Usage:
  {{- include "global-templates.networkpolicy" . }}

Values structure - see networkpolicy_defaults in values.yaml for annotated options.

Key design: networkPolicy.egress.serviceEntries is a MAP (not a list) so that
  the base chart can define shared entries (e.g. google-apis) and per-environment
  values-additional.yaml can add env-specific entries (e.g. sql-server) via Helm's
  deep map merge, without duplicating the shared entries in every environment.

  15008/TCP (HBONE) and 53/UDP (DNS) are always emitted in the L4 NetworkPolicy.
*/}}
{{- define "global-templates.networkpolicy" -}}
{{- $np        := .Values.networkPolicy -}}
{{- $ns        := ($np.namespace | default .Release.Namespace) -}}
{{- $ingress   := $np.ingress  | default dict -}}
{{- $ingressL4 := $ingress.l4  | default dict -}}
{{- $ingressL7 := $ingress.l7  | default dict -}}
{{- $egress    := $np.egress   | default dict -}}
{{- $egressL4  := $egress.l4   | default dict -}}

{{/* ─────────────────────────────────────────────────────────────
     INGRESS - L4  Istio AuthorizationPolicy
     Deny-by-default; explicitly allows same-namespace + gateway principals.
     Disable with: networkPolicy.ingress.l4.enabled: false
     ───────────────────────────────────────────────────────────── */}}
{{- if ne ($ingressL4.enabled | toString) "false" }}
---
# L4 - Istio AuthorizationPolicy (deny-by-default ingress)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $ingressL4.name | default "allow-internal-sources-l4" }}
  namespace: {{ $ns }}
spec:
  action: ALLOW
  rules:
    {{- if ne ($ingressL4.allowSameNamespace | toString) "false" }}
    # Intra-namespace traffic (ztunnel peer-to-peer, other services in the same NS)
    - from:
        - source:
            namespaces: [{{ $ns | quote }}]
      {{- with $ingressL4.ingressPorts }}
      to:
        - operation:
            ports:
              {{- range . }}
              - {{ . | quote }}
              {{- end }}
      {{- end }}
    {{- end }}
    # Shared gateways and waypoint proxy (Istio ambient mode)
    - from:
        - source:
            principals:
              {{- range ($ingressL4.gatewayPrincipals | default (list
                "cluster.local/ns/gateway-api/sa/shared-gateway-int-istio"
                "cluster.local/ns/gateway-api/sa/shared-waypoint")) }}
              - {{ . | quote }}
              {{- end }}
      {{- with $ingressL4.gatewayPorts }}
      to:
        - operation:
            ports:
              {{- range . }}
              - {{ . | quote }}
              {{- end }}
      {{- end }}
{{- end }}

{{/* ─────────────────────────────────────────────────────────────
     INGRESS - L7  Istio AuthorizationPolicy  (optional)
     Restricts access to a specific service by path and/or HTTP method.
     Enable with: networkPolicy.ingress.l7.enabled: true
     ───────────────────────────────────────────────────────────── */}}
{{- if $ingressL7.enabled }}
---
# L7 - Istio AuthorizationPolicy (path/method restrictions)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ $ingressL7.name | default "allow-path-from-gateway" }}
  namespace: {{ $ns }}
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: {{ required "networkPolicy.ingress.l7.targetService is required when l7.enabled is true" $ingressL7.targetService }}
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              {{- range ($ingressL7.principals | default (list
                "cluster.local/ns/gateway-api/sa/shared-gateway-int-istio"
                "cluster.local/ns/gateway-api/sa/shared-gateway-ext-istio"
                "cluster.local/ns/gateway-api/sa/shared-waypoint")) }}
              - {{ . | quote }}
              {{- end }}
      to:
        - operation:
            {{- with $ingressL7.paths }}
            paths:
              {{- range . }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
            {{- with $ingressL7.methods }}
            methods:
              {{- range . }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
{{- end }}

{{/* ─────────────────────────────────────────────────────────────
     EGRESS - L4  Kubernetes NetworkPolicy
     Restricts outbound traffic to explicitly declared ports.
     15008/TCP (HBONE) and 53/UDP (DNS) are ALWAYS included.
     Add further ports via: networkPolicy.egress.l4.extraPorts
     Disable with: networkPolicy.egress.l4.enabled: false
     ───────────────────────────────────────────────────────────── */}}
{{- if ne ($egressL4.enabled | toString) "false" }}
---
# L4 - Kubernetes NetworkPolicy (namespace-wide egress restriction)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $egressL4.name | default "allow-egress-required" }}
  namespace: {{ $ns }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    {{- range $egressL4.extraPorts }}
    # {{ .comment | default (printf "port %d/%s" .port (.protocol | default "TCP")) }}
    - to:
      ports:
        - protocol: {{ .protocol | default "TCP" }}
          port: {{ .port }}
    {{- end }}
    # Istio HBONE tunnel (ambient-mode ztunnel ↔ ztunnel CONNECT) - always required
    - to:
      ports:
        - protocol: TCP
          port: 15008
    # DNS - CoreDNS (all namespaces) - always required
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
{{- end }}

{{/* ─────────────────────────────────────────────────────────────
     EGRESS - L7  Istio ServiceEntries  +  optional DestinationRules
     serviceEntries is a MAP so base-chart entries (e.g. google-apis) and
     env-specific entries (e.g. sql-server) deep-merge automatically.
     Keys are sorted alphabetically for deterministic manifest output.
     ───────────────────────────────────────────────────────────── */}}
{{- $serviceEntries := $egress.serviceEntries | default dict }}
{{- range $name := ($serviceEntries | keys | sortAlpha) }}
{{- $se := index $serviceEntries $name }}
---
# L7 Egress - ServiceEntry: {{ $name }}
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    istio.io/use-waypoint: shared-waypoint-egress
    istio.io/use-waypoint-namespace: gateway-api
spec:
  hosts:
    {{- range $se.hosts }}
    - {{ . | quote }}
    {{- end }}
  location: MESH_EXTERNAL
  ports:
    - number: {{ $se.port }}
      name: {{ $se.portName | default ($se.protocol | lower) }}
      protocol: {{ $se.protocol }}
  resolution: DNS
{{- if $se.tls }}
---
# DestinationRule - TLS origination for: {{ $name }}
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: {{ $name }}-tls-origination
  namespace: {{ $ns }}
spec:
  host: {{ first $se.hosts }}
  trafficPolicy:
    portLevelSettings:
      - port:
          number: {{ $se.tls.originPort | default $se.port }}
        tls:
          mode: {{ $se.tls.mode | default "SIMPLE" }}
{{- end }}
{{- end }}
{{- end }}
