{{/*
  Application Metrics Dashboard - Full variant (4 panels)
  Shows: CPU, Memory, Restart Count, Network I/O
  Usage: include "global-templates.dashboard.appMetrics" (dict "appName" "medical-api" "namespace" "medical-api" "containerName" "api")
*/}}
{{- define "global-templates.dashboard.appMetrics" -}}
{{- $appName := .appName | required "appName is required for appMetrics dashboard" -}}
{{- $namespace := .namespace | default .appName -}}
{{- $containerName := .containerName | default .appName -}}
{{- $title := printf "%s - Application Metrics" ($appName | title | replace "-" " ") -}}
{{- $tags := list "prometheus" $appName "application" -}}
{
  "title": {{ $title | quote }},
  "tags": {{ $tags | toJson }},
  "timezone": "browser",
  "schemaVersion": 39,
  "refresh": "30s",
  "time": {
    "from": "now-1h",
    "to": "now"
  },
  "templating": {
    "list": [
      {
        "current": {"selected": true, "text": "Mimir", "value": "mimir"},
        "hide": 0,
        "includeAll": false,
        "label": "Datasource",
        "multi": false,
        "name": "datasource",
        "options": [],
        "query": "prometheus",
        "queryValue": "",
        "refresh": 1,
        "regex": "",
        "skipUrlSync": false,
        "type": "datasource"
      }
    ]
  },
  "panels": [
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
      "id": 1,
      "title": "Pod CPU Usage",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "rate(container_cpu_usage_seconds_total{namespace=\"%s\", container=\"%s\"}[5m])" $namespace $containerName | quote }},
          "legendFormat": "{{`{{pod}}`}}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "percentunit",
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
      "id": 2,
      "title": "Pod Memory Usage",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "container_memory_working_set_bytes{namespace=\"%s\", container=\"%s\"}" $namespace $containerName | quote }},
          "legendFormat": "{{`{{pod}}`}}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "bytes",
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
      "id": 3,
      "title": "Pod Restart Count",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "kube_pod_container_status_restarts_total{namespace=\"%s\", container=\"%s\"}" $namespace $containerName | quote }},
          "legendFormat": "{{`{{pod}}`}}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "short",
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
      "id": 4,
      "title": "Network I/O",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "rate(container_network_receive_bytes_total{namespace=\"%s\"}[5m])" $namespace | quote }},
          "legendFormat": "RX - {{`{{pod}}`}}",
          "refId": "A"
        },
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "rate(container_network_transmit_bytes_total{namespace=\"%s\"}[5m])" $namespace | quote }},
          "legendFormat": "TX - {{`{{pod}}`}}",
          "refId": "B"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "Bps",
          "color": {"mode": "palette-classic"}
        }
      }
    }
  ]
}
{{- end -}}

{{/*
  Uptime & Availability Dashboard
  Shows: blackbox probe success, response time, current status
  Usage: include "global-templates.dashboard.upMonitor" (dict "appName" "medical-api" "dashboard" (dict "jobName" "medical-api-health-check"))
*/}}
{{- define "global-templates.dashboard.upMonitor" -}}
{{- $appName := .appName | required "appName is required for upMonitor dashboard" -}}
{{- $dashboard := .dashboard | default dict -}}
{{- $jobName := $dashboard.jobName | default (printf "%s-health-check" $appName) -}}
{{- $environmentLabel := $dashboard.environmentLabel | default "environment" -}}
{{- $probeWindow := $dashboard.probeWindow | default "5m" -}}
{{- $queryInterval := $dashboard.queryInterval | default "20s" -}}
{{- $refresh := $dashboard.refresh | default "10s" -}}
{{- $title := $dashboard.title | default (printf "%s - Uptime & Availability" ($appName | title | replace "-" " ")) -}}
{{- $tags := $dashboard.tags | default (list "application" $appName "monitoring") -}}
{{- $upExpr := printf "max by (%s, instance) (last_over_time(probe_success{job=\"%s\",%s=~\"$environment\"}[%s]))" $environmentLabel $jobName $environmentLabel $probeWindow -}}
{{- $durationExpr := printf "max by (%s, instance) (last_over_time(probe_duration_seconds{job=\"%s\",%s=~\"$environment\"}[%s]) * 1000)" $environmentLabel $jobName $environmentLabel $probeWindow -}}
{{- $environmentQuery := printf "label_values(probe_success{job=\"%s\"}, %s)" $jobName $environmentLabel -}}
{{- $legendFormat := printf "{{%s}} | {{instance}}" $environmentLabel -}}
{
  "annotations": {
    "list": [
      {
        "builtIn": 1,
        "datasource": {"type": "grafana", "uid": "-- Grafana --"},
        "enable": true,
        "hide": true,
        "iconColor": "rgba(0, 211, 255, 1)",
        "name": "Annotations & Alerts",
        "type": "dashboard"
      }
    ]
  },
  "editable": true,
  "fiscalYearStartMonth": 0,
  "graphTooltip": 0,
  "links": [],
  "panels": [
    {
      "datasource": {"type": "prometheus", "uid": "${datasource}"},
      "description": "Shows probe success (Up / Down). Collected by the Prometheus blackbox exporter.",
      "fieldConfig": {
        "defaults": {
          "decimals": 0,
          "min": 0,
          "max": 1,
          "color": {"mode": "thresholds"},
          "custom": {"axisLabel": "Status", "axisPlacement": "auto", "drawStyle": "line", "fillOpacity": 0, "lineInterpolation": "stepAfter", "lineWidth": 1, "pointSize": 5, "showPoints": "auto"},
          "mappings": [{"options": {"0": {"text": "Down"}, "1": {"text": "Up"}}, "type": "value"}],
          "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]}
        },
        "overrides": []
      },
      "gridPos": {"h": 9, "w": 24, "x": 0, "y": 0},
      "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
      "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": {{ $upExpr | quote }}, "interval": {{ $queryInterval | quote }}, "intervalFactor": 1, "legendFormat": {{ $legendFormat | quote }}, "refId": "A"}],
      "title": "Probe: Up / Down",
      "type": "timeseries"
    },
    {
      "datasource": {"type": "prometheus", "uid": "${datasource}"},
      "description": "Round-trip time for the blackbox probe. Higher values indicate slower responses or potential network issues.",
      "fieldConfig": {
        "defaults": {
          "unit": "ms",
          "decimals": 0,
          "color": {"mode": "thresholds"},
          "custom": {"axisLabel": "Response Time", "axisPlacement": "auto", "drawStyle": "line", "fillOpacity": 0, "lineInterpolation": "linear", "lineWidth": 1, "pointSize": 5, "showPoints": "auto"},
          "mappings": [],
          "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 200}, {"color": "red", "value": 500}]}
        },
        "overrides": []
      },
      "gridPos": {"h": 9, "w": 24, "x": 0, "y": 9},
      "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
      "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": {{ $durationExpr | quote }}, "interval": {{ $queryInterval | quote }}, "intervalFactor": 1, "legendFormat": {{ $legendFormat | quote }}, "refId": "B"}],
      "title": "Response Time (ms)",
      "type": "timeseries"
    },
    {
      "datasource": {"type": "prometheus", "uid": "${datasource}"},
      "fieldConfig": {
        "defaults": {
          "unit": "none",
          "decimals": 0,
          "mappings": [{"options": {"0": {"text": "Down", "color": "red"}, "1": {"text": "Up", "color": "green"}}, "type": "value"}],
          "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]},
          "color": {"mode": "thresholds"}
        },
        "overrides": []
      },
      "gridPos": {"h": 4, "w": 12, "x": 0, "y": 18},
      "id": 3,
      "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "justifyMode": "auto", "orientation": "auto", "textMode": "value", "colorMode": "background", "graphMode": "none"},
      "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": {{ $upExpr | quote }}, "interval": {{ $queryInterval | quote }}, "intervalFactor": 1, "refId": "A"}],
      "title": "Current Status",
      "type": "stat"
    }
  ],
  "preload": false,
  "refresh": {{ $refresh | quote }},
  "schemaVersion": 41,
  "tags": {{ $tags | toJson }},
  "templating": {
    "list": [
      {"current": {"text": "Mimir", "value": "mimir"}, "name": "datasource", "options": [], "query": "prometheus", "refresh": 1, "type": "datasource"},
      {"allValue": ".*", "includeAll": true, "label": "Environment", "multi": true, "name": "environment", "options": [], "query": {{ $environmentQuery | quote }}, "refresh": 1, "type": "query"}
    ]
  },
  "time": {"from": "now-5m", "to": "now"},
  "timepicker": {},
  "timezone": "browser",
  "title": {{ $title | quote }},
  "version": 1
}
{{- end -}}

{{/*
  Istio Service Metrics Dashboard - Full variant (6 panels)
  Shows: Request Rate, Success Rate, Duration P95, Response Codes, Inbound/Outbound Traffic
  Usage: include "global-templates.dashboard.istioMetrics" (dict "appName" "medical-api" "namespace" "medical-api" "serviceName" "medical-api")
*/}}
{{- define "global-templates.dashboard.istioMetrics" -}}
{{- $appName := .appName | required "appName is required for istioMetrics dashboard" -}}
{{- $namespace := .namespace | default .appName -}}
{{- $serviceName := .serviceName | default .appName -}}
{{- $title := printf "%s - Istio Service Metrics" ($appName | title | replace "-" " ") -}}
{{- $tags := list "istio" $appName "service-mesh" -}}
{
  "title": {{ $title | quote }},
  "tags": {{ $tags | toJson }},
  "timezone": "browser",
  "schemaVersion": 39,
  "refresh": "30s",
  "time": {
    "from": "now-1h",
    "to": "now"
  },
  "templating": {
    "list": [
      {
        "current": {"selected": true, "text": "Mimir", "value": "mimir"},
        "hide": 0,
        "includeAll": false,
        "label": "Datasource",
        "multi": false,
        "name": "datasource",
        "options": [],
        "query": "prometheus",
        "queryValue": "",
        "refresh": 1,
        "regex": "",
        "skipUrlSync": false,
        "type": "datasource"
      }
    ]
  },
  "panels": [
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
      "id": 1,
      "title": "Request Rate",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "rate(istio_requests_total{destination_service_name=\"%s\"}[5m])" $serviceName | quote }},
          "legendFormat": "{{`{{source_workload}} -> {{destination_service_name}}`}}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "reqps",
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
      "id": 2,
      "title": "Request Success Rate (%)",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "sum(rate(istio_requests_total{destination_service_name=\"%s\",response_code!~\"5.*\"}[5m])) / sum(rate(istio_requests_total{destination_service_name=\"%s\"}[5m])) * 100" $serviceName $serviceName | quote }},
          "legendFormat": "Success Rate",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "percent",
          "min": 0,
          "max": 100,
          "color": {"mode": "thresholds"},
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"color": "red", "value": 0},
              {"color": "yellow", "value": 95},
              {"color": "green", "value": 99}
            ]
          }
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
      "id": 3,
      "title": "Request Duration P95 (ms)",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_service_name=\"%s\"}[5m])) by (le, source_workload))" $serviceName | quote }},
          "legendFormat": "{{`{{source_workload}}`}} -> {{ $serviceName }}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "ms",
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
      "id": 4,
      "title": "Response Codes",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "rate(istio_requests_total{destination_service_name=\"%s\"}[5m])" $serviceName | quote }},
          "legendFormat": "{{`{{response_code}}`}}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "reqps",
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
      "id": 5,
      "title": "Inbound Traffic",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "rate(istio_tcp_received_bytes_total{destination_service_name=\"%s\"}[5m])" $serviceName | quote }},
          "legendFormat": "{{`{{source_workload}}`}} -> {{ $serviceName }}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "Bps",
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
      "id": 6,
      "title": "Outbound Traffic",
      "type": "timeseries",
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "rate(istio_tcp_sent_bytes_total{source_workload=\"%s\"}[5m])" $serviceName | quote }},
          "legendFormat": "{{ $serviceName }} -> {{`{{destination_service_name}}`}}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "Bps",
          "color": {"mode": "palette-classic"}
        }
      }
    }
  ]
}
{{- end -}}

{{/*
  Security & Compliance Dashboard (Trivy) - Standard variant (11 panels)
  Shows: Vulnerability stats, config audit stats, severity distributions, trends, detailed tables, CVE list
  Usage: include "global-templates.dashboard.security" (dict "appName" "medical-api" "namespace" "medical-api")
*/}}
{{- define "global-templates.dashboard.security" -}}
{{- $appName := .appName | required "appName is required for security dashboard" -}}
{{- $namespace := .namespace | default .appName -}}
{{- $title := printf "%s - Security & Compliance" ($appName | title | replace "-" " ") -}}
{{- $tags := list "trivy" "security" $appName "compliance" -}}
{
  "title": {{ $title | quote }},
  "tags": {{ $tags | toJson }},
  "timezone": "browser",
  "schemaVersion": 39,
  "fiscalYearStartMonth": 0,
  "refresh": "1m",
  "editable": true,
  "templating": {
    "list": [
      {
        "current": {"selected": true, "text": "Mimir", "value": "mimir"},
        "hide": 0,
        "includeAll": false,
        "label": "Datasource",
        "multi": false,
        "name": "datasource",
        "options": [],
        "query": "prometheus",
        "queryValue": "",
        "refresh": 1,
        "regex": "",
        "skipUrlSync": false,
        "type": "datasource"
      }
    ]
  },
  "panels": [
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
      "id": 1,
      "title": "Total Vulnerabilities",
      "type": "stat",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum(trivy_image_vulnerabilities{namespace=\"%s\"})" $namespace | quote }},
        "instant": true,
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "color": {"mode": "thresholds"},
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"color": "green", "value": null},
              {"color": "yellow", "value": 10},
              {"color": "red", "value": 50}
            ]
          }
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
      "id": 2,
      "title": "Critical CVEs",
      "type": "stat",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum(trivy_image_vulnerabilities{namespace=\"%s\",severity=\"Critical\"})" $namespace | quote }},
        "instant": true,
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "color": {"mode": "thresholds"},
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"color": "green", "value": null},
              {"color": "orange", "value": 1},
              {"color": "red", "value": 5}
            ]
          }
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
      "id": 3,
      "title": "Total Misconfigurations",
      "type": "stat",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum(trivy_resource_configaudits{namespace=\"%s\"})" $namespace | quote }},
        "instant": true,
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "color": {"mode": "thresholds"},
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"color": "green", "value": null},
              {"color": "yellow", "value": 5},
              {"color": "red", "value": 20}
            ]
          }
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
      "id": 4,
      "title": "High/Critical Config Issues",
      "type": "stat",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum(trivy_resource_configaudits{namespace=\"%s\",severity=~\"Critical|High\"})" $namespace | quote }},
        "instant": true,
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "color": {"mode": "thresholds"},
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"color": "green", "value": null},
              {"color": "orange", "value": 1},
              {"color": "red", "value": 5}
            ]
          }
        }
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
      "id": 5,
      "title": "CVE Severity Distribution",
      "type": "piechart",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (severity) (trivy_image_vulnerabilities{namespace=\"%s\"})" $namespace | quote }},
        "legendFormat": "{{`{{severity}}`}}",
        "instant": true,
        "refId": "A"
      }],
      "options": {
        "legend": {"displayMode": "table", "placement": "right"},
        "pieType": "pie"
      },
      "fieldConfig": {
        "overrides": [
          {"matcher": {"id": "byName", "options": "Critical"}, "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "High"}, "properties": [{"id": "color", "value": {"fixedColor": "orange", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "Medium"}, "properties": [{"id": "color", "value": {"fixedColor": "yellow", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "Low"}, "properties": [{"id": "color", "value": {"fixedColor": "blue", "mode": "fixed"}}]}
        ]
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
      "id": 6,
      "title": "Configuration Issues by Severity",
      "type": "piechart",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (severity) (trivy_resource_configaudits{namespace=\"%s\"})" $namespace | quote }},
        "legendFormat": "{{`{{severity}}`}}",
        "instant": true,
        "refId": "A"
      }],
      "options": {
        "legend": {"displayMode": "table", "placement": "right"},
        "pieType": "pie"
      },
      "fieldConfig": {
        "overrides": [
          {"matcher": {"id": "byName", "options": "Critical"}, "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "High"}, "properties": [{"id": "color", "value": {"fixedColor": "orange", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "Medium"}, "properties": [{"id": "color", "value": {"fixedColor": "yellow", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "Low"}, "properties": [{"id": "color", "value": {"fixedColor": "blue", "mode": "fixed"}}]}
        ]
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
      "id": 7,
      "title": "Vulnerability Trend Over Time",
      "type": "timeseries",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (severity) (trivy_image_vulnerabilities{namespace=\"%s\"})" $namespace | quote }},
        "legendFormat": "{{`{{severity}}`}}",
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "color": {"mode": "palette-classic"},
          "custom": {"lineWidth": 2, "fillOpacity": 10}
        },
        "overrides": [
          {"matcher": {"id": "byName", "options": "Critical"}, "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "High"}, "properties": [{"id": "color", "value": {"fixedColor": "orange", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "Medium"}, "properties": [{"id": "color", "value": {"fixedColor": "yellow", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "Low"}, "properties": [{"id": "color", "value": {"fixedColor": "blue", "mode": "fixed"}}]}
        ]
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
      "id": 8,
      "title": "Configuration Issues Trend",
      "type": "timeseries",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (severity) (trivy_resource_configaudits{namespace=\"%s\"})" $namespace | quote }},
        "legendFormat": "{{`{{severity}}`}}",
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "color": {"mode": "palette-classic"},
          "custom": {"lineWidth": 2, "fillOpacity": 10}
        },
        "overrides": [
          {"matcher": {"id": "byName", "options": "Critical"}, "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "High"}, "properties": [{"id": "color", "value": {"fixedColor": "orange", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "Medium"}, "properties": [{"id": "color", "value": {"fixedColor": "yellow", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "Low"}, "properties": [{"id": "color", "value": {"fixedColor": "blue", "mode": "fixed"}}]}
        ]
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
      "id": 9,
      "title": "Vulnerabilities by Image",
      "type": "table",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (image_repository, image_tag, severity) (trivy_image_vulnerabilities{namespace=\"%s\"})" $namespace | quote }},
        "format": "table",
        "instant": true,
        "refId": "A"
      }],
      "transformations": [
        {"id": "organize", "options": {"excludeByName": {"Time": true}, "indexByName": {"image_repository": 0, "image_tag": 1, "severity": 2, "Value": 3}, "renameByName": {"image_repository": "Image", "image_tag": "Tag", "severity": "Severity", "Value": "Count"}}}
      ],
      "fieldConfig": {
        "overrides": [
          {"matcher": {"id": "byName", "options": "Severity"}, "properties": [{"id": "custom.width", "value": 100}]},
          {"matcher": {"id": "byName", "options": "Count"}, "properties": [{"id": "custom.width", "value": 80}]}
        ]
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
      "id": 10,
      "title": "Configuration Issues by Resource",
      "type": "table",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (resource_kind, resource_name, severity) (trivy_resource_configaudits{namespace=\"%s\"})" $namespace | quote }},
        "format": "table",
        "instant": true,
        "refId": "A"
      }],
      "transformations": [
        {"id": "organize", "options": {"excludeByName": {"Time": true}, "indexByName": {"resource_kind": 0, "resource_name": 1, "severity": 2, "Value": 3}, "renameByName": {"resource_kind": "Kind", "resource_name": "Resource", "severity": "Severity", "Value": "Count"}}}
      ],
      "fieldConfig": {
        "overrides": [
          {"matcher": {"id": "byName", "options": "Severity"}, "properties": [{"id": "custom.width", "value": 100}]},
          {"matcher": {"id": "byName", "options": "Count"}, "properties": [{"id": "custom.width", "value": 80}]}
        ]
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "description": "Vulnerabilities detected in container images. Click CVE ID to view details on NVD. Use filters and pagination (50 per page) to navigate results.",
      "gridPos": {"h": 14, "w": 24, "x": 0, "y": 28},
      "id": 11,
      "title": "CVE Details (up to 50)",
      "type": "table",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "trivy_vulnerability_id{vuln_id=~\"CVE.*\", namespace=\"%s\"}" $namespace | quote }},
        "format": "table",
        "instant": true,
        "refId": "A"
      }],
      "transformations": [
        {"id": "organize", "options": {"excludeByName": {"Time": true, "Value": true, "__name__": true, "cluster": true, "container": true, "endpoint": true, "instance": true, "job": true, "name": true, "pod": true, "service": true, "image_digest": true, "image_registry": true, "container_name": true, "resource_kind": true, "resource_name": true, "installed_version": true, "fixed_version": true, "resource": true, "vuln_score": true, "published_date": true, "last_modified_date": true}, "indexByName": {"vuln_id": 0, "vuln_title": 1, "severity": 2, "image_repository": 3, "image_tag": 4}, "renameByName": {"vuln_id": "CVE ID", "vuln_title": "Description", "severity": "Severity", "image_repository": "Image", "image_tag": "Tag"}}}
      ],
      "options": {
        "footer": {"enablePagination": true, "fields": "", "reducer": ["sum"], "show": true},
        "showHeader": true,
        "sortBy": [{"displayName": "Severity", "desc": true}],
        "cellHeight": "sm"
      },
      "fieldConfig": {
        "defaults": {
          "custom": {"align": "auto", "displayMode": "auto", "filterable": true, "inspect": false}
        },
        "overrides": [
          {"matcher": {"id": "byName", "options": "CVE ID"}, "properties": [{"id": "links", "value": [{"targetBlank": true, "title": "View CVE Details on NVD", "url": "https://nvd.nist.gov/vuln/detail/${__value.text}"}]}, {"id": "custom.width", "value": 160}]},
          {"matcher": {"id": "byName", "options": "Description"}, "properties": [{"id": "custom.width", "value": 400}]},
          {"matcher": {"id": "byName", "options": "Severity"}, "properties": [{"id": "mappings", "value": [{"options": {"Critical": {"color": "red", "index": 0}, "High": {"color": "orange", "index": 1}, "Medium": {"color": "yellow", "index": 2}, "Low": {"color": "blue", "index": 3}}, "type": "value"}]}, {"id": "custom.displayMode", "value": "color-background-solid"}, {"id": "custom.width", "value": 100}]},
          {"matcher": {"id": "byName", "options": "Image"}, "properties": [{"id": "custom.width", "value": 250}]},
          {"matcher": {"id": "byName", "options": "Tag"}, "properties": [{"id": "custom.width", "value": 120}]}
        ]
      }
    },
    {
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "description": "Configuration audit findings from Trivy Operator. Shows resources with security misconfigurations. Click resource name to view detailed report via kubectl: kubectl get configauditreport <resource-name> -n {{ $namespace }} -o yaml",
      "gridPos": {"h": 14, "w": 24, "x": 0, "y": 42},
      "id": 12,
      "title": "Misconfigurations by Resource (up to 50)",
      "type": "table",
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "trivy_resource_configaudits{namespace=\"%s\"}" $namespace | quote }},
        "format": "table",
        "instant": true,
        "refId": "A"
      }],
      "transformations": [
        {"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "cluster": true, "container": true, "endpoint": true, "instance": true, "job": true, "pod": true, "service": true}, "indexByName": {"resource_kind": 0, "resource_name": 1, "severity": 2, "Value": 3}, "renameByName": {"resource_kind": "Kind", "resource_name": "Resource", "severity": "Severity", "Value": "Issues"}}}
      ],
      "options": {
        "footer": {"enablePagination": true, "fields": "", "reducer": ["sum"], "show": true},
        "showHeader": true,
        "sortBy": [{"displayName": "Severity", "desc": true}, {"displayName": "Issues", "desc": true}],
        "cellHeight": "sm"
      },
      "fieldConfig": {
        "defaults": {
          "custom": {"align": "auto", "displayMode": "auto", "filterable": true, "inspect": false}
        },
        "overrides": [
          {"matcher": {"id": "byName", "options": "Kind"}, "properties": [{"id": "custom.width", "value": 150}]},
          {"matcher": {"id": "byName", "options": "Resource"}, "properties": [{"id": "custom.width", "value": 400}, {"id": "links", "value": [{"title": "View Full Report (kubectl)", "url": ""}]}]},
          {"matcher": {"id": "byName", "options": "Severity"}, "properties": [{"id": "mappings", "value": [{"options": {"Critical": {"color": "red", "index": 0}, "High": {"color": "orange", "index": 1}, "Medium": {"color": "yellow", "index": 2}, "Low": {"color": "blue", "index": 3}}, "type": "value"}]}, {"id": "custom.displayMode", "value": "color-background-solid"}, {"id": "custom.width", "value": 120}]},
          {"matcher": {"id": "byName", "options": "Issues"}, "properties": [{"id": "custom.width", "value": 100}, {"id": "custom.displayMode", "value": "color-text"}, {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "orange", "value": 3}, {"color": "red", "value": 5}]}}]}
        ]
      }
    }
  ]
}
{{- end -}}

{{/*
  OpenCost per-app cost dashboard template
  Shows estimated costs based on resource allocation and node costs
  
  Required parameters:
    - appName: Name of the application
    - namespace: Kubernetes namespace
  
  Usage: include "global-templates.dashboard.openCost" (dict "appName" "medical-api" "namespace" "medical-api")
*/}}
{{- define "global-templates.dashboard.openCost" -}}
{{- $appName := .appName | required "appName is required for openCost dashboard" -}}
{{- $namespace := .namespace | default .appName -}}
{{- $title := printf "%s - Cost Analysis" ($appName | title | replace "-" " ") -}}
{{- $tags := list "opencost" "cost" $appName "finops" -}}
{
  "title": {{ $title | quote }},
  "tags": {{ $tags | toJson }},
  "timezone": "browser",
  "schemaVersion": 39,
  "refresh": "5m",
  "time": {"from": "now-7d", "to": "now"},
  "templating": {
    "list": [
      {
        "current": {"selected": true, "text": "Mimir", "value": "mimir"},
        "hide": 0,
        "includeAll": false,
        "label": "Datasource",
        "multi": false,
        "name": "datasource",
        "options": [],
        "query": "prometheus",
        "queryValue": "",
        "refresh": 1,
        "regex": "",
        "skipUrlSync": false,
        "type": "datasource"
      }
    ]
  },
  "panels": [
    {
      "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
      "id": 1,
      "title": "Estimated Monthly Cost",
      "description": "Based on current CPU and memory allocation",
      "type": "stat",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum(sum by (pod) ((container_cpu_allocation{namespace=\"%s\"} * on (node) group_left() avg by (node) (node_cpu_hourly_cost)) + (container_memory_allocation_bytes{namespace=\"%s\"} / 1024 / 1024 / 1024 * on (node) group_left() avg by (node) (node_ram_hourly_cost)))) * 730" $namespace $namespace | quote }},
        "instant": true,
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "unit": "currencyGBP",
          "color": {"mode": "thresholds"},
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"color": "green", "value": null},
              {"color": "yellow", "value": 100},
              {"color": "red", "value": 500}
            ]
          }
        }
      }
    },
    {
      "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
      "id": 2,
      "title": "CPU Cost (Monthly)",
      "type": "stat",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum(container_cpu_allocation{namespace=\"%s\"} * on (node) group_left() avg by (node) (node_cpu_hourly_cost)) * 730" $namespace | quote }},
        "instant": true,
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "unit": "currencyGBP",
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
      "id": 3,
      "title": "Memory Cost (Monthly)",
      "type": "stat",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum(container_memory_allocation_bytes{namespace=\"%s\"} / 1024 / 1024 / 1024 * on (node) group_left() avg by (node) (node_ram_hourly_cost)) * 730" $namespace | quote }},
        "instant": true,
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "unit": "currencyGBP",
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
      "id": 4,
      "title": "Pod Count",
      "type": "stat",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "count(container_cpu_allocation{namespace=\"%s\"})" $namespace | quote }},
        "instant": true,
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "color": {"mode": "palette-classic"}
        }
      }
    },
    {
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
      "id": 5,
      "title": "Cost by Pod (Monthly)",
      "type": "piechart",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (pod) ((container_cpu_allocation{namespace=\"%s\"} * on (node) group_left() avg by (node) (node_cpu_hourly_cost)) + (container_memory_allocation_bytes{namespace=\"%s\"} / 1024 / 1024 / 1024 * on (node) group_left() avg by (node) (node_ram_hourly_cost))) * 730" $namespace $namespace | quote }},
        "legendFormat": "{{`{{pod}}`}}",
        "refId": "A"
      }],
      "options": {
        "legend": {"displayMode": "table", "placement": "right"},
        "pieType": "pie"
      }
    },
    {
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
      "id": 6,
      "title": "CPU vs Memory Cost Split",
      "type": "piechart",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "sum(container_cpu_allocation{namespace=\"%s\"} * on (node) group_left() avg by (node) (node_cpu_hourly_cost)) * 730" $namespace | quote }},
          "legendFormat": "CPU",
          "refId": "A"
        },
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "expr": {{ printf "sum(container_memory_allocation_bytes{namespace=\"%s\"} / 1024 / 1024 / 1024 * on (node) group_left() avg by (node) (node_ram_hourly_cost)) * 730" $namespace | quote }},
          "legendFormat": "Memory",
          "refId": "B"
        }
      ],
      "options": {
        "legend": {"displayMode": "table", "placement": "right"},
        "pieType": "donut"
      },
      "fieldConfig": {
        "overrides": [
          {"matcher": {"id": "byName", "options": "CPU"}, "properties": [{"id": "color", "value": {"fixedColor": "blue", "mode": "fixed"}}]},
          {"matcher": {"id": "byName", "options": "Memory"}, "properties": [{"id": "color", "value": {"fixedColor": "purple", "mode": "fixed"}}]}
        ]
      }
    },
    {
      "gridPos": {"h": 8, "w": 24, "x": 0, "y": 12},
      "id": 7,
      "title": "Cost Trend Over Time (Hourly)",
      "type": "timeseries",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum((container_cpu_allocation{namespace=\"%s\"} * on (node) group_left() avg by (node) (node_cpu_hourly_cost)) + (container_memory_allocation_bytes{namespace=\"%s\"} / 1024 / 1024 / 1024 * on (node) group_left() avg by (node) (node_ram_hourly_cost)))" $namespace $namespace | quote }},
        "legendFormat": "Total Hourly Cost",
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "unit": "currencyGBP",
          "color": {"mode": "palette-classic"},
          "custom": {"lineWidth": 2, "fillOpacity": 20, "gradientMode": "opacity"}
        }
      }
    },
    {
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
      "id": 8,
      "title": "CPU Allocation",
      "type": "timeseries",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (pod) (container_cpu_allocation{namespace=\"%s\"})" $namespace | quote }},
        "legendFormat": "{{`{{pod}}`}}",
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "unit": "short",
          "color": {"mode": "palette-classic"},
          "custom": {"lineWidth": 1, "fillOpacity": 10, "stacking": {"mode": "normal"}}
        }
      }
    },
    {
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
      "id": 9,
      "title": "Memory Allocation",
      "type": "timeseries",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (pod) (container_memory_allocation_bytes{namespace=\"%s\"})" $namespace | quote }},
        "legendFormat": "{{`{{pod}}`}}",
        "refId": "A"
      }],
      "fieldConfig": {
        "defaults": {
          "unit": "bytes",
          "color": {"mode": "palette-classic"},
          "custom": {"lineWidth": 1, "fillOpacity": 10, "stacking": {"mode": "normal"}}
        }
      }
    },
    {
      "gridPos": {"h": 8, "w": 24, "x": 0, "y": 28},
      "id": 10,
      "title": "Cost Details by Pod",
      "type": "table",
      "datasource": {"type": "prometheus", "uid": "mimir"},
      "targets": [{
        "datasource": {"type": "prometheus", "uid": "mimir"},
        "expr": {{ printf "sum by (pod) ((container_cpu_allocation{namespace=\"%s\"} * on (node) group_left() avg by (node) (node_cpu_hourly_cost)) + (container_memory_allocation_bytes{namespace=\"%s\"} / 1024 / 1024 / 1024 * on (node) group_left() avg by (node) (node_ram_hourly_cost))) * 730" $namespace $namespace | quote }},
        "format": "table",
        "instant": true,
        "refId": "A"
      }],
      "transformations": [
        {"id": "organize", "options": {"excludeByName": {"Time": true}, "indexByName": {"pod": 0, "Value": 1}, "renameByName": {"pod": "Pod", "Value": "Monthly Cost (GBP)"}}}
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "currencyGBP"
        },
        "overrides": [
          {"matcher": {"id": "byName", "options": "Monthly Cost (GBP)"}, "properties": [{"id": "custom.width", "value": 200}]}
        ]
      }
    }
  ]
}
{{- end -}}

{{/*
  Main orchestrator - renders all enabled dashboards from templates
  Also handles folder creation if createFolder is true
  Usage: include "global-templates.dashboardTemplates.render" .
*/}}
{{- define "global-templates.dashboardTemplates.render" -}}
{{- if .grafanaDashboardTemplates }}
{{- $config := .grafanaDashboardTemplates }}
{{- if $config.enabled }}
{{- $global_values := .Values.global -}}
{{- $common_defaults := .Values.common_defaults -}}
{{- $appName := $config.appName | required "grafanaDashboardTemplates.appName is required" -}}
{{- $namespace := $config.namespace | default $appName -}}
{{- $folder := $config.folder | required "grafanaDashboardTemplates.folder is required" -}}
{{- $folderTitle := $config.folderTitle | default (printf "%s Applications" ($folder | title)) -}}
{{- $dashboardNamespace := $config.dashboardNamespace | default "grafana-shared" -}}
{{- $containerName := "" -}}
{{- if $config.dashboards.appMetrics -}}
{{- $containerName = $config.dashboards.appMetrics.containerName | default $appName -}}
{{- end -}}
{{- $serviceName := "" -}}
{{- if $config.dashboards.istioMetrics -}}
{{- $serviceName = $config.dashboards.istioMetrics.serviceName | default $appName -}}
{{- end -}}

{{/* Create Grafana Folder if requested */}}
{{- if $config.createFolder }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: {{ $folder }}
  namespace: {{ include "helpers.prefixNamespace" (dict "namespace" $dashboardNamespace "global" $global_values) }}
  labels:
    dashboards: grafana
    {{- include "helpers.labels" (dict "context" $ "customLabels" dict "defaultLabels" $common_defaults.labels) | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
    {{- if $common_defaults.annotations }}
    {{- include "helpers.annotations" (dict "context" $ "customAnnotations" dict "defaultAnnotations" $common_defaults.annotations) | nindent 4 }}
    {{- end }}
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  title: {{ $folderTitle | quote }}
{{- end }}

{{/* Render Application Metrics Dashboard if enabled */}}
{{- if and $config.dashboards.appMetrics $config.dashboards.appMetrics.enabled }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ printf "%s-app-metrics" $appName }}
  namespace: {{ include "helpers.prefixNamespace" (dict "namespace" $dashboardNamespace "global" $global_values) }}
  labels:
    dashboards: grafana
    {{- include "helpers.labels" (dict "context" $ "customLabels" dict "defaultLabels" $common_defaults.labels) | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true,Replace=true
    {{- if $common_defaults.annotations }}
    {{- include "helpers.annotations" (dict "context" $ "customAnnotations" dict "defaultAnnotations" $common_defaults.annotations) | nindent 4 }}
    {{- end }}
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: {{ $folderTitle | quote }}
  json: {{ include "global-templates.dashboard.appMetrics" (dict "appName" $appName "namespace" $namespace "containerName" $containerName) | toJson }}
{{- end }}

{{/* Render Uptime Dashboard if enabled */}}
{{- if and $config.dashboards.upMonitor $config.dashboards.upMonitor.enabled }}
{{- $upMonitorName := $config.dashboards.upMonitor.name | default (printf "%s-up-monitor" $appName) }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ $upMonitorName }}
  namespace: {{ include "helpers.prefixNamespace" (dict "namespace" $dashboardNamespace "global" $global_values) }}
  labels:
    dashboards: grafana
    {{- include "helpers.labels" (dict "context" $ "customLabels" dict "defaultLabels" $common_defaults.labels) | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true,Replace=true
    {{- if $common_defaults.annotations }}
    {{- include "helpers.annotations" (dict "context" $ "customAnnotations" dict "defaultAnnotations" $common_defaults.annotations) | nindent 4 }}
    {{- end }}
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: {{ $folderTitle | quote }}
  json: {{ include "global-templates.dashboard.upMonitor" (dict "appName" $appName "dashboard" $config.dashboards.upMonitor) | toJson }}
{{- end }}

